<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read & Analyze – AnyStudy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand"><a href="/pages/home.html">AnyStudy</a></div>
      <div class="profile-section">
        <button type="button" class="profile-btn" id="profileBtn" aria-label="Open profile menu">
          <img id="profileImage" src="" alt="Profile avatar" />
        </button>
        <div class="popup-menu" id="popupMenu">
          <a href="/pages/profile.html" class="popup-item">Profile</a>
          <a href="#" class="popup-item" data-action="notification">Notification</a>
          <a href="/pages/last-study.html" class="popup-item">History</a>
          <a href="#" class="popup-item" data-action="logout">Logout</a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="feature-section">
        <h1>Read & Analyze</h1>
        <p>Upload documents and ask questions about their content.</p>

        <div class="read-container">
          <div class="read-panel">
            <h3>Document Text</h3>
            <textarea id="documentText" class="feature-textarea" placeholder="Paste your document text here..."></textarea>
          </div>

          <div class="read-panel">
            <h3>Ask a Question</h3>
            <textarea id="readQuestion" class="feature-textarea" placeholder="What do you want to know about this document?"></textarea>
            <button class="button primary" id="readAnalyzeBtn" style="margin-top: 12px;">Analyze</button>
          </div>

          <div class="read-panel">
            <h3>Answer</h3>
            <div class="read-answer" id="readAnswer">
              <p class="placeholder">Your answer will appear here...</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="background-waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/ai/read.js"></script>
</body>
</html>
