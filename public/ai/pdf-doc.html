<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate PDF/Doc – AnyStudy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand"><a href="/pages/home.html">AnyStudy</a></div>
      <div class="profile-section">
        <button type="button" class="profile-btn" id="profileBtn" aria-label="Open profile menu">
          <img id="profileImage" src="" alt="Profile avatar" />
        </button>
        <div class="popup-menu" id="popupMenu">
          <a href="/pages/profile.html" class="popup-item">Profile</a>
          <a href="#" class="popup-item" data-action="notification">Notification</a>
          <a href="/pages/last-study.html" class="popup-item">History</a>
          <a href="#" class="popup-item" data-action="logout">Logout</a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="feature-section">
        <h1>Generate PDF/Doc</h1>
        <p>Create PDF or Word documents from your content.</p>

        <div class="doc-container">
          <div class="doc-panel">
            <h3>Document Title</h3>
            <input type="text" id="docTitle" class="feature-input" placeholder="Enter document title..." />

            <h3 style="margin-top: 24px;">Document Content</h3>
            <textarea id="docContent" class="feature-textarea" placeholder="Enter your document content..."></textarea>

            <h3 style="margin-top: 24px;">Format</h3>
            <select id="docFormat" class="feature-select">
              <option value="pdf">PDF</option>
              <option value="docx">DOCX (Word)</option>
            </select>

            <button class="button primary" id="generateDocBtn" style="margin-top: 24px; width: 100%;">Generate & Download</button>
          </div>

          <div class="doc-panel">
            <h3>Preview</h3>
            <div class="doc-preview" id="docPreview">
              <p class="placeholder">Document preview will appear here...</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="background-waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/ai/pdf-doc.js"></script>
</body>
</html>
