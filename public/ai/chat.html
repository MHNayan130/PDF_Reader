<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – AnyStudy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar persistent-header">
      <div class="brand"><a href="/pages/home.html">ANYSTUDY</a></div>
      <div class="header-spacer"></div>
      <button type="button" class="chat-btn" id="chatSidebarToggle" aria-label="Toggle chat sidebar" title="Chat Assistant" style="display: none;">
        💬
      </button>
      <div class="profile-section">
        <button type="button" class="profile-btn" id="profileBtn" aria-label="Open profile menu">
          <img id="profileImage" src="" alt="Profile avatar" />
        </button>
        <div class="popup-menu" id="popupMenu">
          <a href="/pages/profile.html" class="popup-item">Profile</a>
          <a href="#" class="popup-item" data-action="notification">Notification</a>
          <a href="/pages/last-study.html" class="popup-item">History</a>
          <a href="#" class="popup-item" data-action="logout">Logout</a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="feature-section">
        <h1>Chat Assistant</h1>
        <p>Ask questions and get instant responses from our AI assistant.</p>

        <div class="model-selector">
          <label for="modelSelect">Choose AI Model:</label>
          <select id="modelSelect" class="model-select">
            <option value="deepseek-ai/DeepSeek-V3:novita">DeepSeek V3 (Default)</option>
            <option value="Qwen/Qwen2.5-72B-Instruct">Qwen 2.5 72B</option>
          </select>
        </div>

        <div class="file-upload-area">
          <h3>Attach Files (Optional)</h3>
          <div class="file-upload-buttons">
            <button class="button outline" id="uploadPicBtn">📸 Add Picture</button>
            <button class="button outline" id="uploadPdfBtn">📄 Add PDF</button>
            <button class="button outline" id="uploadDocBtn">📋 Add Document</button>
          </div>
          <input type="file" id="picInput" accept="image/*" hidden />
          <input type="file" id="pdfInput" accept=".pdf" hidden />
          <input type="file" id="docInput" accept=".doc,.docx" hidden />
          <div class="attached-files" id="attachedFiles" style="margin-top: 12px; display: none;">
            <p><strong>Attached Files:</strong></p>
            <div id="filesList"></div>
          </div>
        </div>

        <div class="chat-container" id="chatContainer">
          <div class="chat-messages" id="chatMessages"></div>
        </div>

        <div class="chat-input-area">
          <input
            type="text"
            id="chatInput"
            placeholder="Type your message here..."
            class="chat-input"
            autocomplete="off"
          />
          <button class="button primary" id="chatSendBtn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <div class="background-waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/ai/chat.js"></script>
</body>
</html>
