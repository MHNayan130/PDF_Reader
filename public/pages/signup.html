<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – AnyStudy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a class="logo-link" href="/">AnyStudy</a>
      <h1>Create your account</h1>
      <p class="auth-subtitle">Start uploading and accessing your study files.</p>
      <form id="signupForm" class="auth-form">
        <label>
          Full Name
          <input type="text" id="signupFullname" placeholder="Your full name" required />
        </label>
        <label>
          Username
          <input type="text" id="signupUser" placeholder="Choose a username" required />
        </label>
        <label>
          Password
          <input type="password" id="signupPass" placeholder="Create a password" required />
        </label>
        <label>
          Confirm Password
          <input type="password" id="signupConfirm" placeholder="Confirm password" required />
        </label>
        <button type="submit" class="button primary">Sign Up</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="/pages/login.html">Log in</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
