<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – AnyStudy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand"><a href="/pages/home.html">AnyStudy</a></div>
      <div class="profile-section">
        <button type="button" class="profile-btn" id="profileBtn" aria-label="Open profile menu">
          <img id="profileImage" src="" alt="Profile avatar" />
        </button>
        <div class="popup-menu" id="popupMenu">
          <a href="/pages/profile.html" class="popup-item">Profile</a>
          <a href="#" class="popup-item" data-action="notification">Notification</a>
          <a href="/pages/last-study.html" class="popup-item">History</a>
          <a href="#" class="popup-item" data-action="logout">Logout</a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="welcome-section">
        <h1>My Profile</h1>
        <p>Upload a profile picture and keep it saved for every visit.</p>
      </div>

      <div class="upload-card" style="max-width: 560px; margin: 0 auto; padding: 32px 28px;">
        <img id="avatarPreview" src="" alt="Profile avatar preview" style="width:120px; height:120px; border-radius:50%; object-fit:cover; display:block; margin:0 auto 20px; border:2px solid rgba(124,93,255,0.35);" />
        <div style="text-align:center; margin-bottom:24px; color:#f8fbff;">
          <p style="margin:0; font-weight:600; font-size:1.05rem;" id="profileFullnameText">Your Name</p>
          <p style="margin:4px 0 0; color:rgba(255,255,255,0.68);" id="profileUsernameText">@username</p>
        </div>
        <form id="profileForm" class="auth-form">
          <label>
            Full Name
            <input type="text" id="profileFullname" required />
          </label>
          <label>
            Username
            <input type="text" id="profileUsername" required />
          </label>
          <label>
            New Password (leave empty to keep current)
            <input type="password" id="profilePassword" />
          </label>
          <label>
            Confirm New Password
            <input type="password" id="profileConfirm" />
          </label>
          <label>
            Pick a profile image
            <input type="file" id="avatarInput" accept="image/*" />
          </label>
          <p class="auth-footer">Your image is stored locally and will appear in the top menu.</p>
          <button type="submit" class="button primary">Save Profile</button>
          <div id="profileMessage" style="margin-top: 16px; text-align: center; color: #4CAF50;"></div>
        </form>
      </div>
    </main>
  </div>

  <div class="background-waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
    <div class="particle particle-5"></div>
    <div class="particle particle-6"></div>
    <div class="particle particle-7"></div>
    <div class="particle particle-8"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
