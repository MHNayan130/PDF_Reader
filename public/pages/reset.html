<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – AnyStudy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a class="logo-link" href="/">AnyStudy</a>
      <h1>Reset Password</h1>
      <p class="auth-subtitle">Enter your username and choose a new password.</p>
      <form id="resetForm" class="auth-form">
        <label>
          Username
          <input type="text" id="resetUser" placeholder="Your username" required />
        </label>
        <label>
          New Password
          <input type="password" id="resetPass" placeholder="New password" required />
        </label>
        <label>
          Confirm Password
          <input type="password" id="resetConfirm" placeholder="Confirm new password" required />
        </label>
        <button type="submit" class="button primary">Reset Password</button>
      </form>
      <p class="auth-footer">Back to <a href="/pages/login.html">Log in</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
