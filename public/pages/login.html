<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – AnyStudy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a class="logo-link" href="/">AnyStudy</a>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Log in with your user ID and password.</p>
      <form id="loginForm" class="auth-form">
        <label>
          User ID
          <input type="text" id="loginUser" placeholder="Enter your username" required />
        </label>
        <label>
          Password
          <input type="password" id="loginPass" placeholder="Enter your password" required />
        </label>
        <div class="form-row space-between">
          <a class="text-link" href="/pages/reset.html">Forgot password?</a>
          <button type="submit" class="button primary">Log In</button>
        </div>
      </form>
      <div class="divider"><span>or</span></div>
      <button id="googleBtn" class="button outline google">Continue with Google</button>
      <p class="auth-footer">Don’t have an account? <a href="/pages/signup.html">Sign up</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
