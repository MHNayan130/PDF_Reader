<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings – AnyStudy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand"><a href="/pages/home.html">AnyStudy</a></div>
      <div class="profile-section">
        <button type="button" class="profile-btn" id="profileBtn" aria-label="Open profile menu">
          <img id="profileImage" src="" alt="Profile avatar" />
        </button>
        <div class="popup-menu" id="popupMenu">
          <a href="/pages/profile.html" class="popup-item">Profile</a>
          <a href="#" class="popup-item" data-action="notification">Notification</a>
          <a href="/pages/last-study.html" class="popup-item">History</a>
          <a href="#" class="popup-item" data-action="logout">Logout</a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="welcome-section">
        <h1>Settings</h1>
        <p>Update your account information and keep your security current.</p>
      </div>

      <div class="upload-card" style="max-width: 560px; margin: 0 auto; padding: 32px 28px;">
        <form id="settingsForm" class="auth-form">
          <label>
            Full Name
            <input type="text" id="settingsFullname" placeholder="Your full name" required />
          </label>
          <label>
            New Password
            <input type="password" id="settingsPass" placeholder="New password" />
          </label>
          <label>
            Confirm Password
            <input type="password" id="settingsConfirm" placeholder="Confirm new password" />
          </label>
          <div id="settingsMessage" class="auth-footer" style="margin-bottom: 10px; color: #bfd8ff;"></div>
          <button type="submit" class="button primary">Save Settings</button>
        </form>
      </div>
    </main>
  </div>

  <div class="background-waves">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
    <div class="particle particle-5"></div>
    <div class="particle particle-6"></div>
    <div class="particle particle-7"></div>
    <div class="particle particle-8"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
